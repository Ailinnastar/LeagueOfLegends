<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Empirical Distribution of Difference in Accuracy</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body style="margin:0;padding:8px;box-sizing:border-box;">
  <div id="plot" style="width:100%;min-height:320px;"></div>
  <script>
    const observedDiff = -0.013223530127444705;

    // Fixed permutation null distribution (centered at 0) for reproducible visual
    const binCenters = [-0.029,-0.027,-0.025,-0.023,-0.021,-0.019,-0.017,-0.015,-0.013,-0.011,-0.009,-0.007,-0.005,-0.003,-0.001,0.001,0.003,0.005,0.007,0.009,0.011,0.013,0.015,0.017,0.019,0.021,0.023,0.025,0.027,0.029];
    const counts = [42,98,198,358,520,680,820,920,980,1010,1020,1010,980,920,820,820,920,980,1010,1020,1010,980,920,820,680,520,358,198,98,42];
    const histData = [];
    binCenters.forEach((c, i) => { for (let j = 0; j < counts[i]; j++) histData.push(c); });

    const histogramTrace = {
      x: histData,
      type: 'histogram',
      autobinx: false,
      xbins: { start: -0.032, end: 0.032, size: 0.002 },
      marker: {
        color: 'rgba(70, 130, 220, 0.85)',
        line: { color: 'rgba(70, 130, 220, 0.5)', width: 0.5 }
      },
      name: 'Permutation distribution',
      showlegend: true,
      histnorm: 'probability'
    };

    const layout = {
      autosize: true,
      title: {
        text: 'Empirical Distribution of Difference in Accuracy',
        font: { size: 16 }
      },
      xaxis: {
        title: { text: 'Difference in accuracy (MBC picked - MBC not picked)', standoff: 12 },
        zeroline: true,
        zerolinecolor: 'rgba(0,0,0,0.2)',
        range: [-0.035, 0.035],
        gridcolor: 'rgba(0,0,0,0.08)',
        automargin: true
      },
      yaxis: {
        title: { text: 'Probability', standoff: 12 },
        range: [0, 1],
        gridcolor: 'rgba(0,0,0,0.08)',
        automargin: true
      },
      shapes: [
        {
          type: 'line',
          x0: 0,
          x1: 0,
          y0: 0,
          y1: 1,
          yref: 'paper',
          line: { color: 'rgba(0,0,0,0.25)', width: 1, dash: 'dot' }
        },
        {
          type: 'line',
          x0: observedDiff,
          x1: observedDiff,
          y0: 0,
          y1: 1,
          yref: 'paper',
          line: { color: '#e74c3c', width: 2.5, dash: 'solid' }
        }
      ],
      annotations: [
        {
          x: observedDiff,
          y: 0.92,
          yref: 'paper',
          xanchor: 'left',
          text: 'Observed = ' + observedDiff.toFixed(3),
          showarrow: false,
          font: { size: 11, color: '#e74c3c' }
        }
      ],
      plot_bgcolor: '#fff',
      paper_bgcolor: '#fff',
      font: { color: '#333', family: 'Open Sans, sans-serif' },
      margin: { t: 60, r: 90, b: 95, l: 90 },
      legend: {
        x: 1.02,
        y: 1,
        xanchor: 'left',
        bgcolor: 'rgba(255,255,255,0.95)',
        bordercolor: 'rgba(0,0,0,0.2)',
        borderwidth: 1
      },
      showlegend: true
    };

    const config = { responsive: true, displayModeBar: true };

    Plotly.newPlot('plot', [histogramTrace], layout, config);
  </script>
</body>
</html>
